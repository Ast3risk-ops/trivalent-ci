on:
  workflow_dispatch:
      inputs:
        force_update:
          description: 'Force update'
          required: false
          type: boolean
        dry_run:
          description: 'Dry run'
          required: false
          type: boolean
  schedule:
    - cron: "0 0 * * *"

name: "Update AUR"

jobs:
  update-aur:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - name: Install dependencies
        run: pacman -Sy --noconfirm --needed jq openssh git
      - name: Get latest Trivalent version
        id: version
        run: |
          VERSION=$(curl -s https://api.github.com/repos/secureblue/Trivalent/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Download RPMs and get sha256sums
        id: checksum
        run: |
          curl -sLO "https://repo.secureblue.dev/Packages/trivalent-${{ steps.version.outputs.version }}.x86_64.rpm"
          curl -sLO "https://repo.secureblue.dev/Packages/trivalent-qt6-ui-${{ steps.version.outputs.version }}.x86_64.rpm"
          SHA256_MAIN=$(sha256sum "trivalent-${{ steps.version.outputs.version }}.x86_64.rpm" | cut -d' ' -f1)
          SHA256_UI=$(sha256sum "trivalent-qt6-ui-${{ steps.version.outputs.version }}.x86_64.rpm" | cut -d' ' -f1)
          echo "sha256_main=$SHA256_MAIN" >> $GITHUB_OUTPUT
          echo "sha256_ui=$SHA256_UI" >> $GITHUB_OUTPUT
      - name: Setup SSH for AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
      - name: Clone AUR repo
        env:
          GIT_SSH_COMMAND: "ssh -i ~/.ssh/aur -o IdentitiesOnly=yes -o StrictHostKeyChecking=no"
        run: git clone ssh://aur@aur.archlinux.org/trivalent-bin.git aur-repo
      - name: Check if update needed
        id: check
        working-directory: aur-repo
        run: |
          CURRENT=$(grep '^pkgver=' PKGBUILD | cut -d= -f2)
          VERSION=$(echo "${{ steps.version.outputs.version }}" | cut -d'-' -f1)
          if [ "$CURRENT" = "$VERSION" ] && [ "${{ inputs.force_update }}" != "true" ]; then
            echo "Already up-to-date (version $CURRENT)"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Update available: $CURRENT -> ${{ steps.version.outputs.version }}"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - name: Calculate pkgrel
        id: pkgrel
        working-directory: aur-repo
        run: |
          VERSION=$(echo "${{ steps.version.outputs.version }}" | cut -d'-' -f1)
            CURRENT=$(grep '^pkgver=' PKGBUILD | cut -d= -f2)
            if [ "$CURRENT" = "$VERSION" ]; then
              CURRENT_REL=$(grep '^pkgrel=' PKGBUILD | cut -d= -f2)
              NEW_REL=$((CURRENT_REL + 1))
              echo "pkgrel=$NEW_REL" >> $GITHUB_OUTPUT
            else
              echo "pkgrel=1" >> $GITHUB_OUTPUT
            fi
      - name: Update PKGBUILD
        if: steps.check.outputs.skip != 'true'
        working-directory: aur-repo
        run: |
          PKGVER=$(echo "${{ steps.version.outputs.version }}" | cut -d'-' -f1)
          sed -i "s/^pkgver=.*/pkgver=$PKGVER/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=${{ steps.pkgrel.outputs.pkgrel }}/" PKGBUILD
          sed -i 's|^source=.*|source=("https://repo.secureblue.dev/Packages/trivalent-${{ steps.version.outputs.version }}.x86_64.rpm" "https://repo.secureblue.dev/Packages/trivalent-qt6-ui-${{ steps.version.outputs.version }}.x86_64.rpm")|' PKGBUILD
          sed -i "s|^sha256sums=.*|sha256sums=('${{ steps.checksum.outputs.sha256_main }}' '${{ steps.checksum.outputs.sha256_ui }}')|" PKGBUILD
      - name: Update .SRCINFO
        if: steps.check.outputs.skip != 'true'
        working-directory: aur-repo
        run: |
          useradd -m builder
          mkdir -p /home/builder/build
          cp -a . /home/builder/build
          chown -R builder:builder /home/builder/build
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            cat /home/builder/build/PKGBUILD
          fi
          runuser -u builder -- bash -lc 'cd /home/builder/build && makepkg --printsrcinfo > .SRCINFO'
          cp /home/builder/build/.SRCINFO ./.SRCINFO
      - name: Commit and push
        if: steps.check.outputs.skip != 'true'
        working-directory: aur-repo
        env:
          GIT_SSH_COMMAND: "ssh -i ~/.ssh/aur -o IdentitiesOnly=yes -o StrictHostKeyChecking=no"
        run: |
          git config user.name "ast3riskinc"
          git config user.email "me@asterisk.lol"
          git add PKGBUILD .SRCINFO
          git commit -m "${{ steps.version.outputs.version }} (automated update)"
          git log -p -1
          if [ "${{ inputs.dry_run }}" = "false" ]; then
            git push
          fi
